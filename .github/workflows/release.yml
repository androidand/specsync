name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  issues: read # -resolve-refs looks up each change's issue live via `gh`

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Enforce OpenSpec archive hygiene
        run: go run ./cmd/specsync release-plan -fail-on-archive-candidates
      # The GitHub Release body — and so specsync.se's changelog, which reads
      # it — is always generated by specsync itself: one entry per shipped
      # OpenSpec change, never goreleaser's raw commit dump. `-since`/`-until`
      # are explicit because this checkout's HEAD *is* the new tag, so the
      # CLI's own "latest tag" default would resolve to itself and produce an
      # empty range. `-resolve-refs` looks up a change's issue live (read-only)
      # when its local ref cache is absent — always true in a fresh CI
      # checkout — so entries group by feature instead of falling back to
      # loose commits.
      - name: Generate release notes with specsync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          go build -o /tmp/specsync-release ./cmd/specsync
          CUR="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${CUR}^" 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            PREV=$(git rev-list --max-parents=0 HEAD | tail -1)
          fi
          echo "PREV=$PREV" >> "$GITHUB_ENV"
          /tmp/specsync-release changelog -resolve-refs -since "$PREV" -until "$CUR" -version "${CUR#v}" -release-notes > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "specsync changelog produced an empty release-notes file" >&2
            exit 1
          fi
          echo "--- release notes ($PREV..$CUR) ---"
          cat /tmp/release-notes.md
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Append this release to CHANGELOG.md on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main
          git checkout main
          /tmp/specsync-release changelog -resolve-refs -since "$PREV" -until "${GITHUB_REF_NAME}" -version "${GITHUB_REF_NAME#v}" -apply
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: changelog for ${GITHUB_REF_NAME}"
            git push origin main
          fi

  # Publish the npm wrapper after the release (and its binaries) exist, so the
  # postinstall download has something to fetch. The package version is taken
  # from the tag. Auth uses npm Trusted Publishing (OIDC) — no token secret;
  # configure the trusted publisher for @androidand/specsync on npmjs.com.
  npm:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Use npm with trusted publishing support
        run: npm install -g npm@latest
      - name: Sync skill file into npm package
        run: cp -r skills npm/
      - name: Sync package version to tag
        working-directory: npm
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"
      - name: Publish to npm (OIDC trusted publishing)
        working-directory: npm
        run: npm publish --provenance --access public
