name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish the npm wrapper after the release (and its binaries) exist, so the
  # postinstall download has something to fetch. The package version is taken
  # from the tag. Auth uses npm Trusted Publishing (OIDC) — no token secret;
  # configure the trusted publisher for @androidand/specsync on npmjs.com.
  npm:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Use npm with trusted publishing support
        run: npm install -g npm@latest
      - name: Sync package version to tag
        working-directory: npm
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"
      - name: Publish to npm (OIDC trusted publishing)
        working-directory: npm
        run: npm publish --provenance --access public
