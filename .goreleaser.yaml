version: 2

project_name: specsync

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/specsync
    binary: specsync
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Ignored in CI: release.yml always passes --release-notes (generated by
# `specsync changelog`, one entry per shipped OpenSpec change). This block is
# the fallback for a local `goreleaser release` run with no --release-notes.
changelog:
  use: github
